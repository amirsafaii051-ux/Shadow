<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Tracker</title>

  <meta name="theme-color" content="#0b0b0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tracker">

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="IMG_5146.png" />

  <style>
    body{
      margin:0;
      font-family:system-ui;
      background:#0b0b0c;
      color:#fff;
      max-width:720px;
      margin:auto;
      padding:16px;
    }

    .header{
      background:#151517;
      padding:18px;
      border-radius:20px;
      margin-bottom:14px;
      box-shadow:0 10px 30px rgba(0,0,0,.5);
    }

    .week{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .arrow{
      width:44px;
      height:44px;
      border:none;
      border-radius:14px;
      background:#2a2a2e;
      color:#fff;
      font-size:18px;
    }

    .title{ text-align:center; }
    .title b{ font-size:16px; }
    .title small{ color:#888; }

    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
      margin-top:12px;
    }

    .card{
      flex:1;
      background:#1f1f22;
      padding:12px;
      border-radius:14px;
      text-align:center;
    }

    .card div:last-child{
      font-size:20px;
      font-weight:bold;
      margin-top:6px;
    }

    .day{
      background:#151517;
      padding:16px;
      border-radius:18px;
      margin-bottom:12px;
      box-shadow:0 5px 20px rgba(0,0,0,.4);
    }

    .dateRow{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .jalaliBig{
      font-size:38px;
      font-weight:800;
      line-height:1;
    }

    .dayInfo{
      display:flex;
      flex-direction:column;
    }

    .gregorian{
      font-size:18px;
      font-weight:700;
    }

    .jalali{
      font-size:13px;
      color:#777;
      margin-top:2px;
    }

    .btns{
      display:flex;
      gap:8px;
      margin-top:14px;
    }

    .btn{
      flex:1;
      border:none;
      padding:12px;
      border-radius:14px;
      background:#26262a;
      color:#fff;
      font-weight:600;
      transition:.2s;
    }

    .btn.active.work{background:#4caf50;color:#000;}
    .btn.active.not{background:#f44336;color:#000;}
  </style>
</head>

<body>
  <div class="header">
    <div class="week">
      <button class="arrow" onclick="week(-1)">&#8249;</button>

      <div class="title">
        <b id="weekTitle">Week</b><br>
        <small>Tracker</small><br><button class="arrow" onclick="goToday()" style="margin-top:8px;width:auto;padding:0 12px">Today</button>
      </div>

      <button class="arrow" onclick="week(1)">&#8250;</button>
    </div>

    <div class="stats">
<div class="card">At Work (Week)<div id="w_week">0</div></div>
<div class="card">Not Work (Week)<div id="n_week">0</div></div>
<div class="card">At Work (Total)<div id="w_total">0</div></div>
<div class="card">Not Work (Total)<div id="n_total">0</div></div>
</div>
  </div>

  <div id="list"></div>

  <script>
    let start = new Date();
    start.setDate(start.getDate() - ((start.getDay() + 1) % 7));

    let db = JSON.parse(localStorage.getItem("db") || "{}");

    function save(){
      localStorage.setItem("db", JSON.stringify(db));
    }

    function key(d){ return d.toDateString(); }

    function jalaliDate(d){
      return new Intl.DateTimeFormat('fa-IR-u-ca-persian',{
        month:'long',day:'numeric'
      }).format(d);
    }

    function jalaliDay(d){
      return new Intl.DateTimeFormat('fa-IR-u-ca-persian-nu-latn',{
        day:'numeric'
      }).format(d);
    }

    function jalaliMonth(d){
      return new Intl.DateTimeFormat('fa-IR-u-ca-persian',{
        month:'long'
      }).format(d);
    }

    function render(){
      let list = document.getElementById("list");
      list.innerHTML="";

      let work=0,not=0;
      let totalWork=0,totalNot=0;

      Object.values(db).forEach(v=>{
        if(v.work) totalWork++;
        if(v.not) totalNot++;
      });

      for(let i=0;i<7;i++){
        let d = new Date(start);
        d.setDate(start.getDate()+i);

        let k = key(d);
        if(!db[k]) db[k]={work:false,not:false};

        let v = db[k];
        if(v.work) work++;
        if(v.not) not++;

        let el = document.createElement("div");
        el.className="day";

        el.innerHTML=`
          <div class="dateRow">
            <div class="jalaliBig">${jalaliDay(d)}</div>
            <div class="dayInfo">
              <div class="gregorian">${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]}</div>
              <div class="jalali">${jalaliMonth(d)}</div>
            </div>
          </div>

          <div class="btns">
            <button class="btn ${v.work?'active work':''}" onclick="toggle('${k}','work')">At Work</button>
            <button class="btn ${v.not?'active not':''}" onclick="toggle('${k}','not')">Not Work</button>
          </div>
        `;

        list.appendChild(el);
      }

      document.getElementById("w_week").innerText=work;
      document.getElementById("n_week").innerText=not;
      document.getElementById("w_total").innerText=totalWork;
      document.getElementById("n_total").innerText=totalNot;
    }

    function toggle(k,t){
      if(!db[k]) db[k]={work:false,not:false};
      db[k][t]=!db[k][t];
      save();
      render();
    }

    function goToday(){
      start=new Date();
      start.setDate(start.getDate()-((start.getDay() + 1) % 7));
      render();
    }

    function week(x){
      start.setDate(start.getDate()+x*7);
      render();
    }

    render();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
